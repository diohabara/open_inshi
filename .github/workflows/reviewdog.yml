name: reviewdog
on: [pull_request]
jobs:
  textlint:
    name: runner / textlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - uses: reviewdog/action-setup@v1
      - name: textlint
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.github_token }}
        run: |
          npx textlint -f checkstyle "articles/**" \
            | reviewdog -f=checkstyle -name="textlint" -reporter=github-pr-review -level=warning
